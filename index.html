<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decibel Pro | Visual Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #00f2ff;
            --text: #ffffff;
            --card-bg: rgba(10, 15, 25, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Lexend', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
            animation: float 15s infinite alternate;
        }
        @keyframes float {
            from { transform: translate(-30%, -30%); }
            to { transform: translate(30%, 30%); }
        }
        .container {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 3rem;
            width: 95%;
            max-width: 1000px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
        }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 0.5rem; }
        h1 span { color: var(--accent); text-shadow: 0 0 30px rgba(0, 242, 255, 0.5); }
        .subtitle { opacity: 0.4; text-transform: uppercase; letter-spacing: 4px; font-size: 0.7rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        .val-display { font-size: 4rem; font-weight: 600; color: var(--accent); margin: 0.5rem 0; }
        .unit { font-size: 1rem; opacity: 0.3; margin-left: 5px; }
        canvas {
            width: 100%;
            height: 80px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        #file-data { font-size: 0.85rem; line-height: 1.6; color: #a0aec0; }
        .accent-text { color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <header>
            <h1>Decibel<span>PRO</span></h1>
            <p class="subtitle">Visual & Acoustic Intelligence</p>
        </header>
        <div class="grid">
            <div class="card">
                <h3>Microphone</h3>
                <div class="val-display"><span id="live-val">00</span><span class="unit">dB</span></div>
                <canvas id="mic-viz"></canvas>
                <button id="run-mic">Start Stream</button>
            </div>
            <div class="card">
                <h3>File Analyzer</h3>
                <div class="drop-zone" id="uploader">
                    <p>Drop or Click MP3</p>
                    <input type="file" id="audio-file" accept="audio/*" hidden>
                </div>
                <canvas id="file-viz"></canvas>
                <div id="file-data">No file analyzed.</div>
            </div>
        </div>
    </div>
    <script>
        const runMic = document.getElementById('run-mic');
        const liveVal = document.getElementById('live-val');
        const uploader = document.getElementById('uploader');
        const audioFile = document.getElementById('audio-file');
        const fileData = document.getElementById('file-data');
        const micCanvas = document.getElementById('mic-viz');
        const micCtx = micCanvas.getContext('2d');
        const fileCanvas = document.getElementById('file-viz');
        const fileCtx = fileCanvas.getContext('2d');

        runMic.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const ctx = new AudioContext();
                const src = ctx.createMediaStreamSource(stream);
                const proc = ctx.createAnalyser();
                proc.fftSize = 256;
                src.connect(proc);
                const data = new Uint8Array(proc.frequencyBinCount);
                const buffer = new Float32Array(proc.fftSize);

                const draw = () => {
                    proc.getByteFrequencyData(data);
                    proc.getFloatTimeDomainData(buffer);
                    let sum = 0;
                    for(let i=0; i<buffer.length; i++) sum += buffer[i]*buffer[i];
                    let db = Math.round(20 * Math.log10(Math.sqrt(sum/buffer.length) + 1e-9) + 100);
                    liveVal.innerText = Math.max(0, db);

                    micCtx.clearRect(0, 0, micCanvas.width, micCanvas.height);
                    const barWidth = (micCanvas.width / data.length) * 2.5;
                    let x = 0;
                    for(let i=0; i<data.length; i++) {
                        let h = data[i]/2;
                        micCtx.fillStyle = '#00f2ff';
                        micCtx.fillRect(x, micCanvas.height-h, barWidth, h);
                        x += barWidth + 1;
                    }
                    requestAnimationFrame(draw);
                };
                draw();
                runMic.style.display = 'none';
            } catch (e) { alert("Mic required."); }
        };

        uploader.onclick = () => audioFile.click();
        audioFile.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const ctx = new AudioContext();
                const decoded = await ctx.decodeAudioData(ev.target.result);
                const data = decoded.getChannelData(0);
                
                let peak=0, sum=0;
                fileCtx.clearRect(0,0,fileCanvas.width,fileCanvas.height);
                fileCtx.fillStyle = '#00f2ff';
                const step = Math.ceil(data.length / fileCanvas.width);
                const amp = fileCanvas.height / 2;
                for(let i=0; i<fileCanvas.width; i++) {
                    let min=1, max=-1;
                    for(let j=0; j<step; j++) {
                        let dat = data[(i*step)+j];
                        if(dat<min) min=dat;
                        if(dat>max) max=dat;
                        if(Math.abs(dat)>peak) peak=Math.abs(dat);
                        sum += dat*dat;
                    }
                    fileCtx.fillRect(i, (1+min)*amp, 1, Math.max(1, (max-min)*amp));
                }
                const pDb = 20 * Math.log10(peak || 1e-9);
                const rDb = 20 * Math.log10(Math.sqrt(sum/data.length) || 1e-9);
                fileData.innerHTML = `Peak: <span class='accent-text'>${pDb.toFixed(1)} dBFS</span> | RMS: <span class='accent-text'>${rDb.toFixed(1)} dBFS</span>`;
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
